name: Java CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permissions for Gradle
        run: chmod +x app/gradlew

      - name: Build project
        run: cd app && ./gradlew build

      - name: Run tests
        run: cd app && ./gradlew test

      - name: Run linter (Checkstyle)
        run: cd app && ./gradlew checkstyleMain checkstyleTest

      - name: Upload test results
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: app/build/test-results/test/

      - name: Upload code coverage to SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: cd app && ./gradlew jacocoTestReport sonar
